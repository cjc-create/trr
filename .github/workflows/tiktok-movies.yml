name: Run TikTok Movie Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # تشغيل كل 6 ساعات (اختياري)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg fonts-kacst

      - name: Install Node Dependencies
        run: |
          npm install puppeteer-extra puppeteer-extra-plugin-stealth
          npm install puppeteer-screen-recorder --legacy-peer-deps
          npm install puppeteer

      - name: Run Bot and Capture
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          xvfb-run --server-args="-screen 0 1080x1920x24" node upload.js

      # 🎬 خطوة رفع الفيديو النهائي المجهز للتيك توك
      - name: Upload TikTok Video Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tiktok-movie-video
          path: tiktok_ready.mp4
          retention-days: 7
